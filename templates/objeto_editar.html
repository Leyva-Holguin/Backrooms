{% extends "base.html" %}

{% block title %}Editar Objeto{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Editar Objeto #{{ objeto.numero }}: {{ objeto.nombre }}</h1>
</div>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card card1">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label text-white">Numero del objeto *</label>
                        <input type="number" class="form-control" name="numero" value="{{ objeto.numero }}" required min="0">
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-white">Nombre del objeto *</label>
                        <input type="text" class="form-control" name="nombre" value="{{ objeto.nombre }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-white">Descripcion *</label>
                        <textarea class="form-control" name="descripcion" rows="4" required>{{ objeto.descripcion }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-white">Localizacion</label>
                        <input type="text" class="form-control" name="localizacion" value="{{ objeto.localizacion or '' }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-white">Rareza</label>
                        <select class="form-select" name="rareza">
                            <option value="">Seleccionar...</option>
                            <option value="Desconocida" {% if objeto.rareza == 'Desconocida' %}selected{% endif %}>Desconocida</option>   
                            <option value="distribuido" {% if objeto.rareza == 'distribuido' %}selected{% endif %}>distribuido</option>     
                            <option value="comun" {% if objeto.rareza == 'comun' %}selected{% endif %}>Comun</option>
                            <option value="medianamente comun" {% if objeto.rareza == 'medianamente comun' %}selected{% endif %}>Medianamente comun</option>
                            <option value="Poco comun" {% if objeto.rareza == 'Poco comun' %}selected{% endif %}>Poco comun</option>
                            <option value="media" {% if objeto.rareza == 'media' %}selected{% endif %}>Media</option>       
                            <option value="Raro" {% if objeto.rareza == 'Raro' %}selected{% endif %}>Raro</option>
                            <option value="bastante raro" {% if objeto.rareza == 'bastante raro' %}selected{% endif %}>Bastante raro</option>
                            <option value="muy raro" {% if objeto.rareza == 'muy raro' %}selected{% endif %}>Muy raro</option>
                            <option value="extremadamnete raro" {% if objeto.rareza == 'extremadamnete raro' %}selected{% endif %}>Extremadamnete raro</option>                            
                            <option value="bastante infrecuente" {% if objeto.rareza == 'bastante infrecuente' %}selected{% endif %}>Bastante infrecuente</option>
                            <option value="variable" {% if objeto.rareza == 'variable' %}selected{% endif %}>Variable</option>
                            <option value="Unico" {% if objeto.rareza == 'Unico' %}selected{% endif %}>Unico</option>
                            <option value="Inevitable de encontrar" {% if objeto.rareza == 'Inevitable de encontrar' %}selected{% endif %}>Inevitable de encontrar</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-white">Clase</label>
                        <select class="form-select" name="clase">
                            <option value="">Seleccionar...</option>
                            <option value="positiva" {% if objeto.clase == 'positiva' %}selected{% endif %}>Positivo</option>
                            <option value="Neutra" {% if objeto.clase == 'Neutra' %}selected{% endif %}>Neutral</option>
                            <option value="negativo" {% if objeto.clase == 'negativo' %}selected{% endif %}>Negativo</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-white">Obtencion</label>
                        <textarea class="form-control" name="obtencion" rows="2">{{ objeto.obtencion or '' }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-white">Variaciones (separadas por comas)</label>
                        <input type="text" class="form-control" name="variaciones" value="{{ objeto.variaciones|join(', ') }}">
                        <small class="text-muted">Separa cada variacion con una coma</small>
                    </div>

                    <button type="submit" class="btn btn-warning">Guardar Cambios</button>
                    <a href="/mis_objetos" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
