{% extends "base.html" %}

{% block title %}Agregar Nivel{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Agregar Nuevo Nivel de Backrooms</h1>
</div>
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card card1">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label text-white">Nombre del nivel *</label>
                        <input type="text" class="form-control" name="nombre" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-white">Numero del nivel *</label>
                        <input type="number" class="form-control" name="numero" required min="0">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-white">Dificultad de supervivencia *</label>
                        <select class="form-select" name="peligro" required>
                            <option value="0">0 - Seguro</option>
                            <option value="1">1 - Seguro</option>
                            <option value="2">2 - Bajo riesgo</option>
                            <option value="3">3 - Riesgo moderado</option>
                            <option value="4">4 - Alto riesgo</option>
                            <option value="5">5 - Extremo</option>
                        </select>
                    </div>
                    <div class="card mb-3 card3">
                        <div class="card-header drop1 text-white">
                            <h5 class="mb-0">Loot disponible</h5>
                        </div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label class="form-label text-white">Liquidos</label>
                                <input type="text" class="form-control" name="liquidos" placeholder="Ej: Agua de almendras">
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-white">Comida</label>
                                <input type="text" class="form-control" name="comida" placeholder="Ej: Galletas saladas">
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-white">Otros</label>
                                <input type="text" class="form-control" name="otros" placeholder="Ej: Baterias, linternas">
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-white">Entidades (separadas por comas)</label>
                        <input type="text" class="form-control" name="entidades" placeholder="Ej: Smiler, Hound, Faceling">
                        <small class="text-muted">Separa cada entidad con una coma</small>
                    </div>
                    <div class="card mb-3 card3">
                        <div class="card-header drop1 text-light">
                            <h5 class="mb-0">Eventos del nivel (maximo 3)</h5>
                        </div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label class="form-label text-white">Evento 1 - Nombre</label>
                                <input type="text" class="form-control mb-2" name="evento1_nombre" placeholder="Ej: La habitacion cambia">
                                <label class="form-label text-white">Descripcion</label>
                                <textarea class="form-control" name="evento1_descripcion" rows="2" placeholder="Describe que sucede durante este evento..."></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-white">Evento 2 - Nombre</label>
                                <input type="text" class="form-control mb-2" name="evento2_nombre" placeholder="Ej: Aparecen entidades">
                                <label class="form-label text-white">Descripcion</label>
                                <textarea class="form-control" name="evento2_descripcion" rows="2" placeholder="Describe que sucede durante este evento..."></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-white">Evento 3 - Nombre</label>
                                <input type="text" class="form-control mb-2" name="evento3_nombre" placeholder="Ej: El suelo se vuelve liquido">
                                <label class="form-label text-white">Descripcion</label>
                                <textarea class="form-control" name="evento3_descripcion" rows="2" placeholder="Describe que sucede durante este evento..."></textarea>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-white">Descripcion del nivel *</label>
                        <textarea class="form-control" name="descripcion" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-success">Guardar Nivel</button>
                    <a href="/backrooms" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
