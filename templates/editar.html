{% extends "base.html" %}

{% block title %}Editar Nivel{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Editar Nivel {{ nivel.numero }}: {{ nivel.nombre }}</h1>
    <a href="/mis_niveles" class="btn btn-secondary">← Volver</a>
</div>
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card card1">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label text-white">Nombre del nivel *</label>
                        <input type="text" class="form-control" name="nombre" value="{{ nivel.nombre }}" placeholder="'The Lobby'" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-white">Numero del nivel *</label>
                        <input type="number" class="form-control" name="numero" value="{{ nivel.numero }}" placeholder="0" required min="0">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-white">Dificultad de supervivencia *</label>
                        <select class="form-select" name="peligro" required>
                            <option value="0" {% if nivel.peligro == '0' %}selected{% endif %}>0 - Seguro</option>
                            <option value="1" {% if nivel.peligro == '1' %}selected{% endif %}>1 - Seguro</option>
                            <option value="2" {% if nivel.peligro == '2' %}selected{% endif %}>2 - Bajo riesgo</option>
                            <option value="3" {% if nivel.peligro == '3' %}selected{% endif %}>3 - Riesgo moderado</option>
                            <option value="4" {% if nivel.peligro == '4' %}selected{% endif %}>4 - Alto riesgo</option>
                            <option value="5" {% if nivel.peligro == '5' %}selected{% endif %}>5 - Extremo</option>
                        </select>
                    </div>
                    <div class="card mb-3 card3">
                        <div class="card-header drop1 text-white">
                            <h5 class="mb-0">Loot disponible</h5>
                        </div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label class="form-label text-white">Liquidos</label>
                                <input type="text" class="form-control" name="liquidos" placeholder="Ej: Agua de almendras" value="{{ nivel.loot.liquidos or '' }}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-white">Comida</label>
                                <input type="text" class="form-control" name="comida" placeholder="Ej: Galletas saladas" value="{{ nivel.loot.comida or '' }}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-white">Otros</label>
                                <input type="text" class="form-control" name="otros" placeholder="Ej: Baterias, linternas" value="{{ nivel.loot.otros or '' }}">
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-white">Entidades (separadas por comas)</label>
                        <input type="text" class="form-control" name="entidades"  placeholder="Ej: Smiler, Hound, Faceling"" value="{{ nivel.entidades|join(', ') }}">
                    </div>
                    <div class="card mb-3 card3">
                        <div class="card-header drop1 text-light">
                            <h5 class="mb-0">Eventos del nivel (maximo 3)</h5>
                        </div>
                        <div class="card-body">
                            {% set eventos = nivel.eventos if nivel.eventos else [] %}
                            <div class="mb-3">
                                <label class="form-label text-white">Evento 1 - Nombre</label>
                                <input type="text" class="form-control mb-2" name="evento1_nombre" placeholder="Ej: La habitacion cambia" value="{{ eventos[0]['nombre'] if eventos|length > 0 else '' }}">
                                <label class="form-label text-white">Descripcion</label>
                                <textarea class="form-control" name="evento1_descripcion" placeholder="Describe que sucede durante este evento..." rows="2">{{ eventos[0]['descripcion'] if eventos|length > 0 else '' }}</textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-white">Evento 2 - Nombre</label>
                                <input type="text" class="form-control mb-2" name="evento2_nombre" placeholder="Ej: Aparecen entidades" value="{{ eventos[1]['nombre'] if eventos|length > 1 else '' }}">
                                <label class="form-label text-white">Descripcion</label>
                                <textarea class="form-control" name="evento2_descripcion" placeholder="Describe que sucede durante este evento..." rows="2">{{ eventos[1]['descripcion'] if eventos|length > 1 else '' }}</textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-white">Evento 3 - Nombre</label>
                                <input type="text" class="form-control mb-2" name="evento3_nombre" placeholder="Ej: El suelo se vuelve liquido" value="{{ eventos[2]['nombre'] if eventos|length > 2 else '' }}">
                                <label class="form-label text-white">Descripcion</label>
                                <textarea class="form-control" name="evento3_descripcion" placeholder="Describe que sucede durante este evento..." rows="2">{{ eventos[2]['descripcion'] if eventos|length > 2 else '' }}</textarea>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-white">Descripcion del nivel *</label>
                        <textarea class="form-control" name="descripcion" placeholder="Agrega una descripción" rows="5" required>{{ nivel.descripcion }}</textarea>
                    </div>
                    <button type="submit" class="btn btn-success">Guardar Cambios</button>
                    <a href="/mis_niveles" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
