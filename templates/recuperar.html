{% extends "base.html" %}

{% block title %}Recuperar Contraseña{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="ini1 card">
            <div class="card-header init2 text-white text-center">
                <h2>Recuperar Contraseña</h2>
            </div>
            <div class="card-body">
                <p class="text-center text-muted">Ingresa tu correo electrónico y te enviaremos un código para restablecer tu contraseña.</p>
                
                <form method="POST" action="/recuperarr">
                    <div class="mb-3">
                        <label class="form-label">Correo electrónico</label>
                        <input type="email" class="form-control" name="correor" placeholder="Ingrese su correo electronico" required>
                    </div>
                    <button type="submit" class="btn btn-warning text-muted w-100">Enviar Código</button>
                </form>
                
                <hr>
                <div class="text-center">
                    <a href="/iniciar" class="text-light">Volver al login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
