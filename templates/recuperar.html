{% extends "base.html" %}

{% block title %}Recuperar Contraseña{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card bg-secondary">
            <div class="card-header bg-warning text-dark text-center">
                <h2>Recuperar Contraseña</h2>
            </div>
            <div class="card-body">
                <form method="POST" action="/recuperarr">
                    <div class="mb-3">
                        <label class="form-label">Correo electrónico</label>
                        <input type="email" class="form-control" name="correor" required>
                    </div>
                    <button type="submit" class="btn btn-warning w-100">Enviar</button>
                </form>
                <hr>
                <div class="text-center">
                    <a href="{{ url_for('iniciar') }}" class="text-light">Volver al login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
