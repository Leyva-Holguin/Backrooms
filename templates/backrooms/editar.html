{% extends "base.html" %}

{% block title %}Editar Nivel{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Editar Nivel {{ nivel.numero }}: {{ nivel.nombre }}</h1>
    <a href="/backrooms/mis_niveles" class="btn btn-secondary">← Volver</a>
</div>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card bg-secondary">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nombre del nivel *</label>
                        <input type="text" class="form-control" name="nombre" value="{{ nivel.nombre }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Nivel de peligro *</label>
                        <select class="form-select" name="peligro" required>
                            <option value="Bajo" {% if nivel.peligro == 'Bajo' %}selected{% endif %}>Bajo</option>
                            <option value="Medio" {% if nivel.peligro == 'Medio' %}selected{% endif %}>Medio</option>
                            <option value="Alto" {% if nivel.peligro == 'Alto' %}selected{% endif %}>Alto</option>
                            <option value="Crítico" {% if nivel.peligro == 'Crítico' %}selected{% endif %}>Crítico</option>
                        </select>
                    </div>
                    
                    <div class="card mb-3 bg-dark">
                        <div class="card-header">
                            <h5 class="mb-0">Loot disponible</h5>
                        </div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label class="form-label">Líquidos</label>
                                <input type="text" class="form-control" name="liquidos" value="{{ nivel.loot.liquidos or '' }}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Comida</label>
                                <input type="text" class="form-control" name="comida" value="{{ nivel.loot.comida or '' }}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Otros</label>
                                <input type="text" class="form-control" name="otros" value="{{ nivel.loot.otros or '' }}">
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Entidades (separadas por comas)</label>
                        <input type="text" class="form-control" name="entidades" value="{{ nivel.entidades|join(', ') }}">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Descripción del nivel *</label>
                        <textarea class="form-control" name="descripcion" rows="5" required>{{ nivel.descripcion }}</textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-warning">Guardar Cambios</button>
                    <a href="/backrooms/mis_niveles" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
