{% extends "base.html" %}

{% block title %}Nueva Contraseña{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card card1">
            <div class="card-header text-center">
                <h2>Nueva Contraseña</h2>
            </div>
            <div class="card-body">
                <p class="text-center">Ingresa tu nueva contraseña.</p>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label text-white">Nueva contraseña</label>
                        <input type="password" class="form-control" name="nueva_password" required>
                    </div>   
                    <div class="mb-3">
                        <label class="form-label text-white">Confirmar nueva contraseña</label>
                        <input type="password" class="form-control" name="confirmar_password" required>
                    </div>    
                    <button type="submit" class="btn btn-success w-100">Actualizar Contraseña</button>
                </form>
                <hr>
                <div class="text-center">
                    <a href="/iniciar" class="text-light">Volver al login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
