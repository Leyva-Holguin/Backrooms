{% extends "base.html" %}

{% block title %}Nueva Contraseña{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card ini1">
            <div class="card-header init2 text-white text-center">
                <h2>Nueva Contraseña</h2>
            </div>
            <div class="card-body">
                <p class="text-center">Ingresa tu nueva contraseña.</p>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nueva contraseña</label>
                        <input type="password" class="form-control" name="nueva_password" placeholder="Crea una nueva contraseña"
                        pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                        title="Debe contener al menos un número, una mayúscula y tener mínimo 8 caracteres"required>
                    </div>   
                    <div class="mb-3">
                        <label class="form-label">Confirmar nueva contraseña</label>
                        <input type="password" class="form-control" name="confirmar_password" placeholder="Repite tu contraseña"required>
                    </div>    
                    <button type="submit" class="btn btn-warning text-muted w-100">Actualizar Contraseña</button>
                </form>
                <hr>
                <div class="text-center">
                    <a href="/iniciar" class="text-light">Volver al login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
